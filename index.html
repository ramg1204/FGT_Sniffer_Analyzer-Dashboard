<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FortiGate Sniffer Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap');

:root {
  --bg:    #06080d;
  --sf:    #0c1018;
  --s2:    #0f1621;
  --s3:    #141d2b;
  --bd:    #1a2538;
  --bhi:   #253650;
  --cy:    #00d4ff;
  --or:    #ff6b35;
  --gr:    #00e676;
  --ye:    #ffd600;
  --re:    #ff2d2d;
  --wa:    #ff9800;
  --pu:    #a855f7;
  --tx:    #b8cce0;
  --td:    #446080;
  --tb:    #e2f0ff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 13px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--tx);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* grid overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative; z-index: 1;
  max-width: 1560px;
  margin: 0 auto;
  padding: 0 28px 80px;
}

/* ─────────────────────── HEADER ─────────────────────── */
.hdr {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 20px 0 18px;
  border-bottom: 1px solid var(--bhi);
  margin-bottom: 24px;
}
.hdr-logo {
  width: 48px; height: 48px;
  background: linear-gradient(145deg, #071d55, #0052cc);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; font-weight: 700; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 24px rgba(0,88,220,.55);
}
.hdr-text { flex: 1; }
.hdr-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--tb); letter-spacing: 2.5px; text-transform: uppercase;
}
.hdr-sub {
  font-size: 10.5px; color: var(--td);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
}
.hdr-meta {
  text-align: right;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--td);
  line-height: 1.8;
}
.hdr-meta span { color: var(--cy); }
.threat-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  flex-shrink: 0;
}
.tb-ready { background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.25); color: var(--cy); }
.tb-high  { background: rgba(255,45,45,.15);  border: 1px solid rgba(255,45,45,.4);  color: var(--re); }
.tb-med   { background: rgba(255,152,0,.12);  border: 1px solid rgba(255,152,0,.3);  color: var(--wa); }
.tb-low   { background: rgba(0,230,118,.1);   border: 1px solid rgba(0,230,118,.3);  color: var(--gr); }

/* ─────────────────────── INPUT ZONE ─────────────────────── */
.input-zone {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 28px;
  transition: border-color .25s;
}
.input-zone:focus-within { border-color: rgba(0,212,255,.35); }

/* terminal titlebar */
.term-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--s2);
  border-bottom: 1px solid var(--bd);
}
.term-dots { display: flex; gap: 6px; }
.term-dot {
  width: 11px; height: 11px; border-radius: 50%;
}
.td-r { background: #ff5f57; }
.td-y { background: #ffbd2e; }
.td-g { background: #28c841; }
.term-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--td); letter-spacing: 1.5px;
  margin-left: 4px;
}
.term-hint {
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--td);
}
.term-hint code {
  color: rgba(0,212,255,.7);
  background: var(--s3);
  padding: 1px 6px; border-radius: 3px;
  border: 1px solid var(--bd);
}

/* textarea */
.log-wrap { position: relative; }
.log-gutter {
  position: absolute; top: 0; left: 0; bottom: 0;
  width: 42px;
  background: var(--s2);
  border-right: 1px solid var(--bd);
  padding: 12px 0;
  display: flex; flex-direction: column;
  align-items: center;
  pointer-events: none;
  overflow: hidden;
}
.lg-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: rgba(68,96,128,.5);
  line-height: 1.54; width: 100%; text-align: center;
}
#log-input {
  width: 100%;
  min-height: 200px;
  max-height: 360px;
  background: transparent;
  border: none; outline: none;
  color: var(--tx);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11.5px; line-height: 1.54;
  padding: 12px 16px 12px 54px;
  resize: vertical;
  caret-color: var(--cy);
}
#log-input::placeholder { color: rgba(68,96,128,.6); }

/* action bar */
.action-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--s2);
  border-top: 1px solid var(--bd);
  flex-wrap: wrap;
}
.btn {
  padding: 8px 22px;
  border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; border: none;
  transition: all .18s;
  display: inline-flex; align-items: center; gap: 7px;
}
.btn-analyze {
  background: var(--cy); color: #000;
}
.btn-analyze:hover {
  background: #33ddff;
  box-shadow: 0 0 20px rgba(0,212,255,.45);
}
.btn-analyze:active { transform: scale(.97); }
.btn-clear {
  background: transparent; color: var(--td);
  border: 1px solid var(--bd);
}
.btn-clear:hover { color: var(--tx); border-color: var(--td); }
.btn-sample {
  background: rgba(255,107,53,.12); color: var(--or);
  border: 1px solid rgba(255,107,53,.3);
}
.btn-sample:hover { background: rgba(255,107,53,.2); }

.status-pill {
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--bd);
  color: var(--td);
  background: var(--s3);
  transition: all .2s;
}
.status-pill.ok  { color: var(--gr); border-color: rgba(0,230,118,.3); background: rgba(0,230,118,.06); }
.status-pill.err { color: var(--re); border-color: rgba(255,45,45,.3); background: rgba(255,45,45,.05); }

/* ─────────────────────── DURATION ─────────────────────── */
.dur-row {
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 18px;
  animation: fadeIn .4s ease;
}
.dur-pill {
  display: flex; align-items: center; gap: 12px;
  background: rgba(0,212,255,.05);
  border: 1px solid rgba(0,212,255,.22);
  border-radius: 8px; padding: 9px 18px;
}
.dp-lbl { font-size: 9.5px; color: var(--td); text-transform: uppercase; letter-spacing: 2px; }
.dp-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; color: var(--cy); font-weight: 700;
}
.dp-range {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9.5px; color: var(--td); margin-top: 2px;
}
.dur-divider { flex: 1; height: 1px; background: var(--bd); }

/* ─────────────────────── KPI STRIP ─────────────────────── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 14px;
  animation: fadeIn .35s ease;
}
.kpi {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 8px; padding: 14px;
  position: relative; overflow: hidden;
  transition: border-color .2s, transform .15s;
}
.kpi:hover { border-color: var(--bhi); transform: translateY(-1px); }
.kpi::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}
.kpi.k1::before { background: linear-gradient(90deg, var(--cy), transparent); }
.kpi.k2::before { background: linear-gradient(90deg, var(--or), transparent); }
.kpi.k3::before { background: linear-gradient(90deg, var(--gr), transparent); }
.kpi.k4::before { background: linear-gradient(90deg, var(--ye), transparent); }
.kpi.k5::before { background: linear-gradient(90deg, var(--re), transparent); }
.kpi.k6::before { background: linear-gradient(90deg, var(--pu), transparent); }
.kpi-lbl {
  font-size: 9.5px; color: var(--td);
  text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 6px;
}
.kpi-val {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px; font-weight: 700; color: var(--tb); line-height: 1;
}
.kpi.k5 .kpi-val { color: var(--re); }
.kpi-unit { font-size: 10px; color: var(--td); margin-top: 3px; }

/* ─────────────────────── PANELS ─────────────────────── */
.panel {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 9px; overflow: hidden;
  animation: fadeIn .4s ease;
}
.panel-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--s2);
  border-bottom: 1px solid var(--bhi);
}
.pdot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.pdot.c1 { background: var(--cy);  box-shadow: 0 0 7px var(--cy); }
.pdot.c2 { background: var(--or);  box-shadow: 0 0 7px var(--or); }
.pdot.c3 { background: var(--gr);  box-shadow: 0 0 7px var(--gr); }
.pdot.c4 { background: var(--ye);  box-shadow: 0 0 7px var(--ye); }
.pdot.c5 { background: var(--re);  box-shadow: 0 0 7px var(--re); }
.pdot.c6 { background: var(--pu);  box-shadow: 0 0 7px var(--pu); }
.panel-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12.5px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--tb);
}
.panel-sub {
  margin-left: 6px;
  font-size: 9.5px; color: var(--td);
}
.panel-cnt {
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9.5px; color: var(--td);
  background: var(--s3); border: 1px solid var(--bd);
  padding: 2px 8px; border-radius: 3px;
}

/* ─────────────────────── TABLE ─────────────────────── */
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--s3); }
th {
  padding: 7px 12px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--td); text-align: left; white-space: nowrap;
  border-bottom: 1px solid var(--bd);
}
th.r { text-align: right; }
tbody tr {
  border-bottom: 1px solid rgba(26,37,56,.55);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(0,212,255,.022); }
td {
  padding: 7px 12px;
  font-size: 12px; color: var(--tx); vertical-align: middle;
}
td.mono {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
}
td.r { text-align: right; }

/* suspicious rows */
tbody tr.susp {
  background: rgba(42,6,6,.7) !important;
  border-left: 3px solid var(--re);
}
tbody tr.susp td { color: #ff9090; font-weight: 600; }
tbody tr.susp td.mono { color: #ff6060; }
tbody tr.susp:hover { background: rgba(58,8,8,.75) !important; }

/* rank badges */
.rk {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 3px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; font-weight: 700;
  background: var(--s2); color: var(--td);
  border: 1px solid var(--bd);
}
.rk.r1 { background: rgba(255,45,45,.22); color: var(--re); border-color: rgba(255,45,45,.45); }
.rk.r2 { background: rgba(255,45,45,.13); color: #ff6a6a; border-color: rgba(255,45,45,.3); }
.rk.r3 { background: rgba(255,45,45,.07); color: #ff9090; border-color: rgba(255,45,45,.2); }

/* bar cells */
.bw { display: flex; align-items: center; gap: 8px; }
.bt { flex: 1; height: 3px; background: var(--s2); border-radius: 2px; min-width: 32px; }
.bf { height: 3px; border-radius: 2px; }
.bf.c1 { background: var(--cy); }
.bf.c2 { background: var(--or); }
.bf.c3 { background: var(--gr); }
.bf.c4 { background: var(--ye); }
.bf.c5 { background: var(--re); }
.bf.c6 { background: var(--pu); }
.bf.xs { background: linear-gradient(90deg, var(--re), #ff6060); }
.bv {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--tb);
  white-space: nowrap; min-width: 52px; text-align: right;
}
.bv.danger { color: var(--re); }

/* protocol chips */
.chip {
  display: inline-block; padding: 1px 6px;
  border-radius: 3px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase;
}
.ch-tcp  { background: rgba(0,212,255,.1);  color: var(--cy); border: 1px solid rgba(0,212,255,.25); }
.ch-udp  { background: rgba(0,230,118,.1);  color: var(--gr); border: 1px solid rgba(0,230,118,.25); }
.ch-icmp { background: rgba(255,214,0,.1);  color: var(--ye); border: 1px solid rgba(255,214,0,.25); }
.ch-oth  { background: rgba(90,112,144,.1); color: var(--td); border: 1px solid var(--bd); }

/* susp badge */
.sb {
  display: inline-flex; align-items: center; gap: 3px;
  background: rgba(255,45,45,.12);
  border: 1px solid rgba(255,45,45,.35);
  border-radius: 3px; padding: 1px 5px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: .8px; color: var(--re);
  text-transform: uppercase; white-space: nowrap;
}

/* ─────────────────────── LAYOUT GRIDS ─────────────────────── */
.g-wide  { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 12px; }
.g-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.g-full  { margin-bottom: 12px; }

/* ─────────────────────── PAIRS (correlation) ─────────────────────── */
.pair-list { display: flex; flex-direction: column; }
.pair-row {
  display: grid;
  grid-template-columns: 140px 14px 160px 70px 60px 80px 80px auto;
  align-items: center; gap: 10px;
  padding: 7px 14px;
  border-bottom: 1px solid rgba(26,37,56,.55);
  transition: background .1s;
}
.pair-row:last-child { border-bottom: none; }
.pair-row:hover { background: rgba(0,212,255,.022); }
.pair-row.susp {
  background: rgba(42,6,6,.65) !important;
  border-left: 3px solid var(--re);
}
.pair-row.susp:hover { background: rgba(58,8,8,.72) !important; }
.pr-src { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cy); text-align: right; }
.pr-arr { color: var(--td); font-size: 10px; text-align: center; }
.pr-dst { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--tx); }
.pr-n   { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; color: var(--cy); text-align: right; }
.pr-b   { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--tb); text-align: right; }
.pair-row.susp .pr-src { color: var(--re); font-weight: 700; }
.pair-row.susp .pr-dst { color: #ff9090; font-weight: 700; }
.pair-row.susp .pr-n   { color: var(--re); }
.pair-row.susp .pr-b   { color: var(--re); }
.pair-hdr {
  display: grid;
  grid-template-columns: 140px 14px 160px 70px 60px 80px 80px auto;
  gap: 10px;
  padding: 7px 14px;
  background: var(--s3); border-bottom: 1px solid var(--bd);
}
.pair-hdr span {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--td);
}
.pair-hdr span.r { text-align: right; }

/* ─────────────────────── CONCLUSIONS ─────────────────────── */
.concl {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 9px; overflow: hidden;
  margin-bottom: 12px;
  animation: fadeIn .45s ease;
}
.thr-banner {
  display: flex; align-items: center; gap: 18px;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.thr-banner.HIGH { background: linear-gradient(90deg, rgba(255,45,45,.07), transparent); }
.thr-banner.MED  { background: linear-gradient(90deg, rgba(255,152,0,.06), transparent); }
.thr-banner.LOW  { background: linear-gradient(90deg, rgba(0,230,118,.05), transparent); }
.thr-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 40px; font-weight: 700; line-height: 1;
}
.thr-lbl { font-size: 9px; color: var(--td); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
.thr-div { width: 1px; height: 52px; background: rgba(255,255,255,.08); flex-shrink: 0; }
.thr-desc { font-size: 12.5px; color: var(--tx); line-height: 1.7; flex: 1; }
.thr-desc strong { color: var(--re); }

.cc-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
.cc { border-right: 1px solid var(--bd); }
.cc:last-child { border-right: none; }
.cc-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 13px;
  border-bottom: 1px solid var(--bd);
}
.cc-icon { font-size: 14px; }
.cc-lbl {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
}
.cc.crit .cc-lbl { color: var(--re); }
.cc.warn .cc-lbl { color: var(--wa); }
.cc.info .cc-lbl { color: var(--cy); }
.cc.good .cc-lbl { color: var(--gr); }
.cc-body { padding: 11px 13px; font-size: 11.5px; color: var(--tx); line-height: 1.55; }
.cc-body strong { color: var(--tb); }
.il { display: flex; align-items: flex-start; gap: 6px; margin-top: 5px; font-size: 11px; }
.il::before { content: '▸'; font-size: 9.5px; margin-top: 2px; flex-shrink: 0; }
.cc.crit .il::before { color: var(--re); }
.cc.warn .il::before { color: var(--wa); }
.cc.info .il::before { color: var(--cy); }
.cc.good .il::before { color: var(--gr); }

/* ─────────────────────── FOOTER ─────────────────────── */
.rpt-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 0;
  border-top: 1px solid var(--bd);
  margin-top: 8px;
  font-size: 10.5px; color: var(--td);
  animation: fadeIn .5s ease;
}
.rpt-badge {
  font-family: 'Share Tech Mono', monospace;
  background: rgba(0,230,118,.07);
  border: 1px solid rgba(0,230,118,.25);
  padding: 2px 10px; border-radius: 3px;
  color: var(--gr);
}

/* ─────────────────────── ANIM ─────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.report-section { animation: fadeIn .38s ease both; }
.report-section:nth-child(1) { animation-delay: .02s; }
.report-section:nth-child(2) { animation-delay: .06s; }
.report-section:nth-child(3) { animation-delay: .10s; }
.report-section:nth-child(4) { animation-delay: .14s; }
.report-section:nth-child(5) { animation-delay: .18s; }
.report-section:nth-child(6) { animation-delay: .22s; }
.report-section:nth-child(7) { animation-delay: .26s; }

/* ─────────────────────── RESPONSIVE ─────────────────────── */
@media (max-width: 1100px) {
  .g-wide, .g-three { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: repeat(3, 1fr); }
  .cc-grid { grid-template-columns: 1fr 1fr; }
  .pair-row, .pair-hdr { grid-template-columns: 1fr 10px 1fr auto auto auto auto auto; }
}
@media (max-width: 720px) {
  .page { padding: 0 14px 60px; }
  .hdr { flex-wrap: wrap; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="page">

  <!-- ══════════ HEADER ══════════ -->
  <header class="hdr">
    <div class="hdr-logo">@RamG</div>
    <div class="hdr-text">
      <div class="hdr-title">FortiGate Sniffer Analyzer Dashboard</div>
      <div class="hdr-sub">Made by @Ramg & Claude Ai</div>
    </div>
    <div class="hdr-meta">
      Parsed: <span id="h-time">—</span><br>
      Lines: <span id="h-lines">—</span> &nbsp;|&nbsp; Pkts: <span id="h-pkts">—</span>
    </div>
    <div class="threat-badge tb-ready" id="threat-badge">⚡ AWAITING INPUT</div>
  </header>

  <!-- ══════════ INPUT ZONE ══════════ -->
  <div class="input-zone" id="input-zone">
    <!-- terminal bar -->
    <div class="term-bar">
      <div class="term-dots">
        <div class="term-dot td-r"></div>
        <div class="term-dot td-y"></div>
        <div class="term-dot td-g"></div>
      </div>
      <div class="term-label">FORTIGATE LOG INPUT</div>
      <div class="term-hint">
        <code>* diagnose sniffer packet any "host X.X.X.X" 4 50 l *</code>
        &nbsp;or&nbsp;
        <code>* diag debug flow *</code>
      </div>
    </div>

    <!-- textarea with gutter -->
    <div class="log-wrap">
      <div class="log-gutter" id="gutter"></div>
      <textarea id="log-input"
        placeholder="Paste your FortiGate sniffer output here…

Accepted formats:

  Sniffer verbose 3:
  2025-03-07 08:00:01.443 port3 in 10.0.3.99.41022 -> 185.220.101.47.53: udp 18
  2025-03-07 08:00:02.441 port3 in 10.0.1.55.51240 -> 52.114.132.73.443: tcp 1380

  Debug flow:
  proto=6, 10.0.1.44:55003->91.108.4.200:443

  Sniffer without date (timestamp only):
  08:00:01.443 port3 in 10.0.3.99.41022 -> 185.220.101.47.53: udp 18

All parsing is done locally in your browser — nothing is sent anywhere."
        oninput="updateGutter()"
        onscroll="syncGutter()"
      ></textarea>
    </div>

    <!-- action bar -->
    <div class="action-bar">
      <button class="btn btn-analyze" onclick="runAnalysis()">⚡ Analyze</button>
      <button class="btn btn-clear"   onclick="clearAll()">✕ Clear</button>
      <div class="status-pill" id="status-pill" style="display:none"></div>
    </div>
  </div>

  <!-- ══════════ REPORT AREA ══════════ -->
  <div id="report"></div>

</div><!-- /page -->

<script>
/* ══════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

const fN = n => (+(n)||0).toLocaleString();

function fB(b) {
  b = +b || 0;
  if (b < 1024)       return b + ' B';
  if (b < 1048576)    return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}

function fDur(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  return [h, m, ss].map(v => String(v).padStart(2, '0')).join(':');
}

function avgPkt(sessions, bytes) {
  return sessions > 0 ? Math.round(bytes / sessions) : 0;
}

// Port → app name map
const PORT_NAMES = {
  20:'FTP-Data', 21:'FTP', 22:'SSH', 23:'Telnet', 25:'SMTP',
  53:'DNS', 67:'DHCP', 69:'TFTP', 80:'HTTP', 110:'POP3',
  123:'NTP', 135:'MS-RPC', 137:'NetBIOS-NS', 139:'NetBIOS',
  143:'IMAP', 161:'SNMP', 179:'BGP', 389:'LDAP', 443:'HTTPS',
  445:'SMB', 465:'SMTPS', 514:'Syslog', 515:'LPD', 587:'SMTP-Sub',
  636:'LDAPS', 993:'IMAPS', 995:'POP3S', 1080:'SOCKS',
  1194:'OpenVPN', 1433:'MSSQL', 1723:'PPTP', 3306:'MySQL',
  3389:'RDP', 4500:'IKE-NAT', 5060:'SIP', 5432:'PgSQL',
  5900:'VNC', 6379:'Redis', 8080:'HTTP-Alt', 8443:'HTTPS-Alt',
  8888:'HTTP-Alt2', 9200:'Elasticsearch', 500:'IKE',
  11211:'Memcached', 27017:'MongoDB'
};
const portName = p => PORT_NAMES[+p] || ('#' + p);

// Protocol chip HTML
function chipProto(p) {
  p = (p || '').toUpperCase();
  if (p === 'TCP')  return `<span class="chip ch-tcp">TCP</span>`;
  if (p === 'UDP')  return `<span class="chip ch-udp">UDP</span>`;
  if (p === 'ICMP' || p === 'ICMP6') return `<span class="chip ch-icmp">ICMP</span>`;
  return `<span class="chip ch-oth">${p}</span>`;
}

const SUSP_BADGE = `<span class="sb">⚠ SUSP</span>`;

// Rank badge
function rkEl(i) {
  const c = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
  return `<span class="rk ${c}">${i + 1}</span>`;
}

// Bar cell
function barCell(val, max, colorClass, label, isDanger) {
  const pct = max > 0 ? Math.round(val / max * 100) : 0;
  const bc = isDanger ? 'xs' : colorClass;
  const vc = isDanger ? ' class="bv danger"' : ' class="bv"';
  return `<div class="bw"><div class="bt"><div class="bf ${bc}" style="width:${pct}%"></div></div><span${vc}>${label}</span></div>`;
}

/* ══════════════════════════════════════════════════════
   GUTTER LINE NUMBERS
══════════════════════════════════════════════════════ */
function updateGutter() {
  const ta = $('log-input');
  const lines = ta.value.split('\n').length;
  const g = $('gutter');
  let html = '';
  for (let i = 1; i <= Math.min(lines + 2, 200); i++) {
    html += `<div class="lg-num">${i}</div>`;
  }
  g.innerHTML = html;
}

function syncGutter() {
  const ta = $('log-input');
  $('gutter').scrollTop = ta.scrollTop;
}

/* ══════════════════════════════════════════════════════
   PARSERS
══════════════════════════════════════════════════════ */
const PROTO_MAP = { '1':'ICMP', '6':'TCP', '17':'UDP', '47':'GRE', '50':'ESP', '58':'ICMP6' };

// Sniffer verbose 2/3/4/6
// 2025-03-07 08:00:01.443 port3 in 10.0.3.99.41022 -> 185.220.101.47.53: udp 18
// or without date:
// 08:00:01.443 port3 in 10.0.3.99.41022 -> 185.220.101.47.53: udp 18
const RE_SNIF = /(?:(\d{4}-\d{2}-\d{2})\s+)?(\d{2}:\d{2}:\d{2}[\d.]*)\s+(\S+)\s+(in|out)\s+(\d+\.\d+\.\d+\.\d+)\.(\d+)\s+->\s+(\d+\.\d+\.\d+\.\d+)\.(\d+):\s+(\w+)\s*(\d*)/i;

// Debug flow: proto=6, 10.0.1.44:55003->91.108.4.200:443
const RE_DBG1 = /proto=(\d+),\s*(\d+\.\d+\.\d+\.\d+):(\d+)->(\d+\.\d+\.\d+\.\d+):(\d+)/;

// Debug flow alt: (proto=6, src-10.0.1.44:55003, dst-91.108.4.200:443
const RE_DBG2 = /\(?proto=(\d+),\s*src-(\d+\.\d+\.\d+\.\d+):(\d+),\s*dst-(\d+\.\d+\.\d+\.\d+):(\d+)/;

function parseLine(line) {
  let m;

  // Sniffer
  m = line.match(RE_SNIF);
  if (m) {
    const datePart = m[1] || '';
    const timePart = m[2];
    const ts = datePart ? datePart + ' ' + timePart : timePart;
    return {
      ts,
      iface:   m[3],
      dir:     m[4],
      srcIP:   m[5],
      srcPort: +m[6],
      dstIP:   m[7],
      dstPort: +m[8],
      proto:   m[9].toUpperCase(),
      bytes:   +m[10] || 64
    };
  }

  // Debug flow variant 1
  m = line.match(RE_DBG1) || line.match(RE_DBG2);
  if (m) {
    return {
      ts:      null,
      iface:   '?',
      dir:     'out',
      srcIP:   m[2],
      srcPort: +m[3],
      dstIP:   m[4],
      dstPort: +m[5],
      proto:   PROTO_MAP[m[1]] || ('P' + m[1]),
      bytes:   64
    };
  }

  return null;
}

function parseTimestamp(ts) {
  if (!ts) return null;
  // With date
  let m = ts.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2}:\d{2})/);
  if (m) return new Date(m[1] + 'T' + m[2] + 'Z');
  // Time only
  m = ts.match(/(\d{2}):(\d{2}):(\d{2})/);
  if (m) {
    const d = new Date(0);
    d.setUTCHours(+m[1], +m[2], +m[3], 0);
    return d;
  }
  return null;
}

/* ══════════════════════════════════════════════════════
   GEO-IP  (client-side prefix heuristics)
══════════════════════════════════════════════════════ */
const GEO = [
  ['10.',         '🏠 Local RFC1918'],
  ['192.168.',    '🏠 Local RFC1918'],
  ['172.16.',     '🏠 Local RFC1918'],
  ['172.17.',     '🏠 Local RFC1918'],
  ['172.18.',     '🏠 Local RFC1918'],
  ['172.19.',     '🏠 Local RFC1918'],
  ['172.20.',     '🏠 Local RFC1918'],
  ['172.21.',     '🏠 Local RFC1918'],
  ['172.22.',     '🏠 Local RFC1918'],
  ['172.23.',     '🏠 Local RFC1918'],
  ['172.24.',     '🏠 Local RFC1918'],
  ['172.25.',     '🏠 Local RFC1918'],
  ['172.26.',     '🏠 Local RFC1918'],
  ['172.27.',     '🏠 Local RFC1918'],
  ['172.28.',     '🏠 Local RFC1918'],
  ['172.29.',     '🏠 Local RFC1918'],
  ['172.30.',     '🏠 Local RFC1918'],
  ['172.31.',     '🏠 Local RFC1918'],
  ['127.',        '🏠 Loopback'],
  ['169.254.',    '🏠 Link-Local'],
  ['142.250.',    '🇺🇸 United States'],
  ['172.217.',    '🇺🇸 United States'],
  ['74.125.',     '🇺🇸 United States'],
  ['8.8.',        '🇺🇸 United States'],
  ['8.4.',        '🇺🇸 United States'],
  ['52.',         '🇺🇸 United States'],
  ['13.',         '🇺🇸 United States'],
  ['54.',         '🇺🇸 United States'],
  ['34.',         '🇺🇸 United States'],
  ['35.',         '🇺🇸 United States'],
  ['104.',        '🇺🇸 United States'],
  ['40.',         '🇺🇸 United States'],
  ['20.',         '🇺🇸 United States'],
  ['23.',         '🇺🇸 United States'],
  ['157.240.',    '🇺🇸 United States'],
  ['31.13.',      '🇮🇪 Ireland'],
  ['185.60.',     '🇮🇪 Ireland'],
  ['77.',         '🇬🇧 United Kingdom'],
  ['81.',         '🇳🇱 Netherlands'],
  ['82.',         '🇳🇱 Netherlands'],
  ['185.',        '🇳🇱 Netherlands'],
  ['91.',         '🇷🇺 Russia'],
  ['95.',         '🇩🇪 Germany'],
  ['78.',         '🇩🇪 Germany'],
  ['1.1.',        '🇦🇺 Australia'],
  ['203.',        '🇯🇵 Japan'],
  ['180.',        '🇨🇳 China'],
  ['221.',        '🇨🇳 China'],
  ['45.',         '🌐 Unknown'],
];
function geoIP(ip) {
  for (const [pfx, name] of GEO) {
    if (ip.startsWith(pfx)) return name;
  }
  return '🌐 Unknown';
}

/* ══════════════════════════════════════════════════════
   AGGREGATION
══════════════════════════════════════════════════════ */
function aggregate(packets) {
  const dstMap   = {};
  const srcMap   = {};
  const sessMap  = {};
  const portMap  = {};
  const ctryMap  = {};
  const pairMap  = {};

  for (const p of packets) {
    const dk = p.dstIP + ':' + p.dstPort;
    if (!dstMap[dk]) dstMap[dk] = { ip: p.dstIP, port: p.dstPort, proto: p.proto, s: 0, b: 0 };
    dstMap[dk].s++; dstMap[dk].b += p.bytes;

    if (!srcMap[p.srcIP]) srcMap[p.srcIP] = { ip: p.srcIP, iface: p.iface, s: 0, b: 0 };
    srcMap[p.srcIP].s++; srcMap[p.srcIP].b += p.bytes;

    const sk = p.srcIP + ':' + p.srcPort + '→' + p.dstIP + ':' + p.dstPort;
    if (!sessMap[sk]) sessMap[sk] = { src: p.srcIP + ':' + p.srcPort, dst: p.dstIP + ':' + p.dstPort, proto: p.proto, pk: 0, b: 0 };
    sessMap[sk].pk++; sessMap[sk].b += p.bytes;

    const portk = p.dstPort + '/' + p.proto;
    if (!portMap[portk]) portMap[portk] = { port: p.dstPort, proto: p.proto, s: 0, b: 0 };
    portMap[portk].s++; portMap[portk].b += p.bytes;

    const country = geoIP(p.dstIP);
    if (!ctryMap[country]) ctryMap[country] = { name: country, s: 0, b: 0 };
    ctryMap[country].s++; ctryMap[country].b += p.bytes;

    const ck = p.srcIP + '→' + p.dstIP;
    if (!pairMap[ck]) pairMap[ck] = { src: p.srcIP, dst: p.dstIP, proto: p.proto, dport: p.dstPort, s: 0, b: 0 };
    pairMap[ck].s++; pairMap[ck].b += p.bytes;
    if (p.dstPort) pairMap[ck].dport = p.dstPort; // keep most recent port
  }

  const topBy = (obj, key, n) => Object.values(obj).sort((a, b) => b[key] - a[key]).slice(0, n);

  return {
    dsts:    topBy(dstMap,  's', 10),
    srcs:    topBy(srcMap,  's', 10),
    sess:    topBy(sessMap, 'b', 10),
    ports:   topBy(portMap, 's',  8),
    ctry:    topBy(ctryMap, 's',  8),
    pairs:   topBy(pairMap, 's', 12),
    total:   packets.length,
    totalB:  packets.reduce((a, p) => a + p.bytes, 0),
    uSrc:    Object.keys(srcMap).length,
    uDst:    Object.keys(dstMap).length,
  };
}

/* ══════════════════════════════════════════════════════
   THREAT DETECTION
══════════════════════════════════════════════════════ */
function detectThreats(d) {
  const threats = [];

  // DNS tunneling: many UDP/53 sessions with tiny avg packet size
  const dnsTunnel = d.sess.filter(s =>
    s.proto === 'UDP' && s.pk > 500 && (s.b / s.pk) < 80
  );
  if (dnsTunnel.length) threats.push({ type: 'dns_tunnel', detail: `${dnsTunnel.length} UDP session(s) with avg pkt < 80B` });

  // Unauthorized VPN: UDP/1194, UDP/500, UDP/4500 in top ports
  const vpnPorts = [1194, 500, 4500];
  const vpnHit = d.ports.slice(0, 4).find(p => p.proto === 'UDP' && vpnPorts.includes(+p.port));
  if (vpnHit) threats.push({ type: 'vpn', detail: `UDP/${vpnHit.port} (${portName(vpnHit.port)}) in top destinations` });

  // Suspicious geo: Russia, China, Unknown/Tor in top 3
  const badGeo = d.ctry.slice(0, 3).filter(c =>
    c.name.includes('Unknown') || c.name.includes('Russia') || c.name.includes('China')
  );
  if (badGeo.length) threats.push({ type: 'geo', detail: `${badGeo.map(g => g.name).join(', ')} in top 3 countries` });

  // SMB lateral movement
  const smb = d.pairs.slice(0, 6).find(p => [445, 139, 3389].includes(+p.dport));
  if (smb) threats.push({ type: 'lateral', detail: `Internal port ${smb.dport} (${portName(smb.dport)}) in top pairs` });

  return threats;
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function renderReport(d, dur, first, last) {
  const threats = detectThreats(d);
  const tl = threats.length >= 2 ? 'HIGH' : threats.length === 1 ? 'MED' : 'LOW';
  const tColor = tl === 'HIGH' ? 'var(--re)' : tl === 'MED' ? 'var(--wa)' : 'var(--gr)';
  const tbClass = tl === 'HIGH' ? 'tb-high' : tl === 'MED' ? 'tb-med' : 'tb-low';

  // header
  $('h-time').textContent = new Date().toLocaleString();
  const badge = $('threat-badge');
  badge.className = 'threat-badge ' + tbClass;
  badge.textContent = `⚠ THREAT: ${tl}`;

  if (dur !== null) {
    const r1 = first ? first.toISOString().replace('T', ' ').slice(0, 19) + ' UTC' : '?';
    const r2 = last  ? last.toISOString().replace('T', ' ').slice(0, 19) + ' UTC' : '?';
  }

  /* ── build rows ── */

  // Destinations
  const dstRows = d.dsts.map((r, i) => {
    const s = i < 3;
    return `<tr class="${s ? 'susp' : ''}">
      <td>${rkEl(i)}</td>
      <td class="mono">${r.ip}</td>
      <td class="mono">${r.port} <span style="color:${s ? '#ff8080' : 'var(--td)'};">${portName(r.port)}</span></td>
      <td>${chipProto(r.proto)}</td>
      <td class="r mono">${fN(r.s)}</td>
      <td>${barCell(r.b, d.dsts[0].b, 'c1', fB(r.b), s)}</td>
      <td class="r mono">${avgPkt(r.s, r.b)} B</td>
      <td>${s ? SUSP_BADGE : '—'}</td>
    </tr>`;
  }).join('');

  // Sessions
  const sessRows = d.sess.map((r, i) => {
    const s = i < 3;
    return `<tr class="${s ? 'susp' : ''}">
      <td>${rkEl(i)}</td>
      <td class="mono" style="font-size:10.5px">${r.src}</td>
      <td class="mono" style="font-size:10.5px">${r.dst}</td>
      <td>${chipProto(r.proto)}</td>
      <td class="r mono">${fN(r.pk)}</td>
      <td>${barCell(r.b, d.sess[0].b, 'c2', fB(r.b), s)}</td>
      <td class="r mono">${avgPkt(r.pk, r.b)} B</td>
      <td>${s ? SUSP_BADGE : '—'}</td>
    </tr>`;
  }).join('');

  // Sources
  const srcRows = d.srcs.map((r, i) => {
    const s = i < 3;
    return `<tr class="${s ? 'susp' : ''}">
      <td>${rkEl(i)}</td>
      <td class="mono">${r.ip}</td>
      <td class="mono">${r.iface || '—'}</td>
      <td class="r mono">${fN(r.s)}</td>
      <td>${barCell(r.b, d.srcs[0].b, 'c3', fB(r.b), s)}</td>
      <td class="r mono">${avgPkt(r.s, r.b)} B</td>
      <td>${s ? SUSP_BADGE : '—'}</td>
    </tr>`;
  }).join('');

  // Ports / Apps
  const portRows = d.ports.map((r, i) => {
    const s = i < 3;
    return `<tr class="${s ? 'susp' : ''}">
      <td>${rkEl(i)}</td>
      <td class="mono">${r.port} <strong style="color:${s ? '#ff8080' : 'var(--tb)'};">${portName(r.port)}</strong></td>
      <td>${chipProto(r.proto)}</td>
      <td class="r mono">${fN(r.s)}</td>
      <td>${barCell(r.b, d.ports[0].b, 'c4', fB(r.b), s)}</td>
      <td class="r mono">${avgPkt(r.s, r.b)} B</td>
      <td>${s ? SUSP_BADGE : '—'}</td>
    </tr>`;
  }).join('');

  // Countries
  const ctryRows = d.ctry.map((r, i) => {
    const s = i < 3 && !r.name.includes('Local');
    return `<tr class="${s ? 'susp' : ''}">
      <td>${rkEl(i)}</td>
      <td>${r.name}</td>
      <td class="r mono">${fN(r.s)}</td>
      <td>${barCell(r.s, d.ctry[0].s, 'c5', fB(r.b), s)}</td>
      <td class="r mono">${avgPkt(r.s, r.b)} B</td>
      <td>${s ? SUSP_BADGE : '—'}</td>
    </tr>`;
  }).join('');

  // Pairs
  const pairRows = d.pairs.map((r, i) => {
    const s = i < 3;
    const nColor = s ? 'style="color:var(--re)"' : i < 6 ? 'style="color:var(--cy)"' : '';
    return `<div class="pair-row ${s ? 'susp' : ''}">
      <div class="pr-src">${r.src}</div>
      <div class="pr-arr">→</div>
      <div class="pr-dst">${r.dst}:${r.dport}</div>
      <div>${chipProto(r.proto)}</div>
      <div class="pr-n" ${nColor}>${fN(r.s)}</div>
      <div class="pr-b">${fB(r.b)}</div>
      <div class="pr-b" style="color:var(--td)">${avgPkt(r.s, r.b)} B</div>
      <div>${s ? SUSP_BADGE : '—'}</div>
    </div>`;
  }).join('');

  // Conclusions
  const hasDns     = threats.find(t => t.type === 'dns_tunnel');
  const hasVpn     = threats.find(t => t.type === 'vpn');
  const hasGeo     = threats.find(t => t.type === 'geo');
  const hasLateral = threats.find(t => t.type === 'lateral');

  const c1 = hasDns
    ? `<div class="cc crit">
        <div class="cc-hdr"><span class="cc-icon">💀</span><div class="cc-lbl">DNS Tunneling</div></div>
        <div class="cc-body"><strong>${hasDns.detail}</strong> — classic C2 beacon or data exfiltration via DNS.
          <div class="il">Restrict outbound UDP/53 to approved resolvers only</div>
          <div class="il">Enable FortiGate DNS Inspection + botnet C2 category block</div>
          <div class="il">Isolate top 3 suspicious source hosts immediately</div>
          <div class="il">Deploy IPS signature: DNS.Tunnel.*</div>
        </div>
      </div>`
    : `<div class="cc good">
        <div class="cc-hdr"><span class="cc-icon">✅</span><div class="cc-lbl">No DNS Tunnel</div></div>
        <div class="cc-body"><strong>No DNS tunneling signature detected.</strong>
          <div class="il">Continue monitoring UDP/53 session volumes</div>
          <div class="il">Set alert threshold: >200 DNS sessions/host/hour</div>
        </div>
      </div>`;

  const c2 = hasVpn
    ? `<div class="cc crit">
        <div class="cc-hdr"><span class="cc-icon">🕵️</span><div class="cc-lbl">Covert VPN/Tunnel</div></div>
        <div class="cc-body"><strong>${hasVpn.detail}.</strong> Bypasses deep packet inspection.
          <div class="il">Block outbound UDP/1194, 500, 4500 unless required</div>
          <div class="il">Enable App Control — block OpenVPN, Tor, proxy apps</div>
          <div class="il">Enforce SSL Deep Inspection on all outbound HTTPS</div>
        </div>
      </div>`
    : `<div class="cc good">
        <div class="cc-hdr"><span class="cc-icon">✅</span><div class="cc-lbl">No VPN Bypass</div></div>
        <div class="cc-body"><strong>No unauthorized VPN tunnel detected in top entries.</strong>
          <div class="il">Monitor UDP/1194, 500, 4500 periodically</div>
          <div class="il">Enable Application Control policy review</div>
        </div>
      </div>`;

  const c3 = hasGeo
    ? `<div class="cc warn">
        <div class="cc-hdr"><span class="cc-icon">⚠️</span><div class="cc-lbl">Geo / Reputation</div></div>
        <div class="cc-body"><strong>${hasGeo.detail}.</strong>

/* ══════════════════════════════════════════════════════
   MAIN — run analysis
══════════════════════════════════════════════════════ */
function runAnalysis() {
  const raw = $('log-input').value.trim();
  if (!raw) { setStatus('Paste log output first.', 'err'); return; }

  const lines = raw.split('\n');
  $('h-lines').textContent = fN(lines.length);

  const packets = [];
  let first = null, last = null;

  for (const line of lines) {
    const p = parseLine(line.trim());
    if (!p) continue;
    packets.push(p);
    if (p.ts) {
      const t = parseTimestamp(p.ts);
      if (t) {
        if (!first || t < first) first = t;
        if (!last  || t > last)  last  = t;
      }
    }
  }

  $('h-pkts').textContent = fN(packets.length);

  if (!packets.length) {
    setStatus('No packets recognized. Check format — see placeholder for examples.', 'err');
    return;
  }

  const dur = (first && last) ? Math.round((last - first) / 1000) : null;
  const fmt = packets.some(p => p.proto !== '?') ? 'sniffer' : 'debug';
  const durStr = dur !== null ? ` · ${fDur(dur)}` : '';
  setStatus(`✓ ${fN(packets.length)} packets · ${fmt}${durStr}`, 'ok');

  renderReport(aggregate(packets), dur, first, last);

  // smooth scroll to report
  setTimeout(() => {
    $('report').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}
